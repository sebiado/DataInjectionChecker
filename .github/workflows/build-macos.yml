name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build App
      run: |
        pyinstaller \
          --windowed \
          --name DataInjectionChecker \
          check_injection.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DataInjectionChecker-macOS
        path: dist/DataInjectionChecker.app